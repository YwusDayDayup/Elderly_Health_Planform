server:
  port: 8080

spring:
  devtools:
    restart:
      enabled: false
  application:
    name: example
  main:
    lazy-initialization: true
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/154laoren?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: AUTO

logging:
  level:
    root: WARN
    com.example.config.web.RequestLogFilter: INFO
    com.example.config.exception.GlobalExceptionHandler: WARN
    com.example.config.StartupAddressLogger: INFO

app:
  auth:
    whitelist:
      - /api/public/**
      - /swagger-ui/**
      - /v3/api-docs/**
      - /error
      - /favicon.ico
      - /actuator/**
      - /uploads/**
  file:
    local-dir: ./uploads
    public-prefix: /uploads
  seed:
    enabled: true
